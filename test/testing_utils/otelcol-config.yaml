extensions:
  health_check:
  pprof:
    endpoint: 127.0.0.1:1888
  zpages:
    endpoint: 127.0.0.1:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4316  # Use different port for collector

processors:
  batch:

exporters:
  file:
    path: test/testing_utils/spans.json

service:
  extensions: [pprof, zpages, health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [file]
