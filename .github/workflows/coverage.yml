name: Coverage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the coverage badge to the badges branch
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'
      
      - name: Install dependencies
        run: dart pub get
      
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      
      - name: Run tests with coverage
        run: |
          chmod +x tool/coverage.sh
          ./tool/coverage.sh
      
      - name: Generate coverage badge
        run: |
          # Extract coverage percentage from lcov.info
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          
          # Create a simple coverage badge HTML
          mkdir -p coverage/html
          cat > coverage/html/badge.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=index.html">
          </head>
          <body>
            <p>Coverage: ${COVERAGE}%</p>
          </body>
          </html>
          EOF
      
      - name: Build coverage badge
        run: python3 tool/make_coverage_badge.py coverage/lcov.info coverage-badge.svg

      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --depth 1 --branch badges "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" /tmp/badges
          cp coverage-badge.svg /tmp/badges/coverage.svg
          cd /tmp/badges
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "Update coverage badge"
            git push
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'coverage/html'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
